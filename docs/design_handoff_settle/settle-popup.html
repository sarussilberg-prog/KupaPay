<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>KupaPay · Settle up · popup</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0F172A; font-family: var(--font-sans); }
    body { display: flex; align-items: center; justify-content: center; }
    @keyframes kupapay-spin  { to { transform: rotate(360deg); } }
    @keyframes kupapay-caret { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }
</style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>

<script type="text/babel" data-presets="react">
// ─────────────────────────────────────────────────────────────────────────
// KupaPay · Settle-up popup
//
// Scenario: you owe David USD 18.00 in "Weekend in Tel Aviv".
// Presented as a bottom-sheet popup over a faded group screen — same chrome
// as the Settlement Detail popup, but for *recording* a payment (not viewing).
//
// Anatomy (top → bottom of the sheet):
//   1. Drag handle · Cancel · "SETTLE UP" · Save
//   2. Emerald hero — From [YOU] → [DAVID] with the editable amount in the middle
//   3. Method tiles — Cash / Bank transfer / PayPal / Other  (icon-only squares)
//   4. Bottom dock — small date chip + big primary "Record payment" button
//
// Sheet sits at ~62% of the phone height. Backdrop is the group screen, faded
// and dimmed with a slate-900/55 scrim. Tap scrim to dismiss.
// ─────────────────────────────────────────────────────────────────────────

const ME    = { id: 'u1', name: 'You',   initials: 'YO', isCurrentUser: true };
const DAVID = { id: 'u3', name: 'David', initials: 'D',  avatarUrl: 'https://i.pravatar.cc/120?img=12' };

const METHODS = [
    { id: 'cash',         label: 'Cash',          icon: 'cash-outline' },
    { id: 'bankTransfer', label: 'Bank transfer', icon: 'card-outline' },
    { id: 'paypal',       label: 'PayPal',        icon: 'logo-paypal' },
    { id: 'other',        label: 'Other',         icon: 'ellipsis-horizontal' },
];

// ─────────────────────────────────────────────────────────────────────────
// SheetHeader — drag handle + Cancel / title / Save row
// ─────────────────────────────────────────────────────────────────────────
function SheetHeader({ title, leftLabel = 'Cancel', rightLabel = 'Save', canSave = true }) {
    return (
        <>
            <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 8, paddingBottom: 4, background: '#fff' }}>
                <div style={{ width: 40, height: 4, borderRadius: 9999, background: 'var(--gray-200)' }} />
            </div>
            <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '4px 8px 8px 8px', background: '#fff',
                borderBottom: '1px solid var(--border-soft)',
            }}>
                <button style={{
                    background: 'transparent', border: 0, padding: '6px 10px',
                    fontSize: 15, fontWeight: 500, color: 'var(--gray-600)',
                    cursor: 'pointer', fontFamily: 'var(--font-sans)',
                }}>{leftLabel}</button>
                <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                    {title}
                </span>
                <button disabled={!canSave} style={{
                    background: 'transparent', border: 0, padding: '6px 10px',
                    fontSize: 15, fontWeight: 700,
                    color: canSave ? 'var(--primary-dark)' : 'var(--gray-400)',
                    cursor: canSave ? 'pointer' : 'not-allowed',
                    fontFamily: 'var(--font-sans)',
                }}>{rightLabel}</button>
            </div>
        </>
    );
}

// ─────────────────────────────────────────────────────────────────────────
// FlowAvatar — one column of the From / To hero
// ─────────────────────────────────────────────────────────────────────────
function FlowAvatar({ member, label }) {
    return (
        <div style={{ width: 96, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
            <div style={{ boxShadow: '0 0 0 3px rgba(255,255,255,0.25)', borderRadius: 9999 }}>
                <MemberAvatar initials={member.initials} avatarUrl={member.avatarUrl} size="md" style={{ border: '2px solid #fff' }} />
            </div>
            <div style={{
                fontSize: 13, fontWeight: 700, color: '#fff',
                textShadow: '0 1px 3px rgba(0,0,0,0.35)',
                width: 96, textAlign: 'center',
                whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{member.isCurrentUser ? 'You' : member.name}</div>
            <div style={{
                fontSize: 9, fontWeight: 700, color: 'rgba(255,255,255,0.8)',
                letterSpacing: '0.08em',
            }}>{label}</div>
        </div>
    );
}

// ─────────────────────────────────────────────────────────────────────────
// SettleUpSheet — the actual popup content (no backdrop, no scrim)
// Goes inside any sheet container that gives it a height.
// ─────────────────────────────────────────────────────────────────────────
function SettleUpSheet() {
    const amount   = 18.00;
    const currency = 'USD';

    return (
        <div style={{ height: '100%', background: 'var(--bg-secondary)', position: 'relative', display: 'flex', flexDirection: 'column', fontFamily: 'var(--font-sans)' }}>
            <SheetHeader title="Settle up" />

            <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 124 }}>

                {/* Emerald hero — From → To */}
                <div style={{ padding: '12px 16px 0 16px' }}>
                    <div style={{
                        height: 196, borderRadius: 16,
                        border: '1px solid var(--success-border)',
                        background: 'linear-gradient(135deg, #10B981 0%, #047857 100%)',
                        position: 'relative', overflow: 'hidden',
                        display: 'flex', flexDirection: 'column',
                    }}>
                        <div style={{
                            position: 'absolute', inset: 0, zIndex: 0,
                            background: 'linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.18) 100%)',
                        }} />

                        {/* Top chrome: chip · group name */}
                        <div style={{
                            position: 'relative', zIndex: 2,
                            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                            padding: '10px 12px 0 12px',
                        }}>
                            <span style={{
                                display: 'inline-flex', alignItems: 'center', gap: 4,
                                padding: '4px 10px', borderRadius: 9999,
                                background: 'rgba(0,0,0,0.45)', color: '#fff',
                                fontSize: 11, fontWeight: 600,
                            }}>
                                <Icon name="checkmark-circle" size={12} color="#fff" />
                                New payment
                            </span>
                            <span style={{
                                fontSize: 11, fontWeight: 500, color: 'rgba(255,255,255,0.92)',
                                textShadow: '0 1px 2px rgba(0,0,0,0.4)',
                            }}>Weekend in Tel Aviv</span>
                        </div>

                        {/* Center flow */}
                        <div style={{
                            position: 'relative', zIndex: 2,
                            flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                            padding: '0 14px',
                        }}>
                            <FlowAvatar member={ME} label="FROM" />
                            <div style={{ flex: 1, minWidth: 0, padding: '0 6px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>

                                {/* Editable amount: USD ⌄  18.00 │ */}
                                <button style={{
                                    display: 'inline-flex', alignItems: 'baseline', gap: 6,
                                    padding: '4px 12px 6px 12px', borderRadius: 12,
                                    background: 'rgba(255,255,255,0.14)',
                                    border: '1px solid rgba(255,255,255,0.32)',
                                    boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.05)',
                                    cursor: 'text', fontFamily: 'var(--font-sans)',
                                    WebkitTapHighlightColor: 'transparent',
                                    position: 'relative',
                                }}>
                                    <span style={{
                                        display: 'inline-flex', alignItems: 'center', gap: 2,
                                        fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.78)',
                                        letterSpacing: '0.04em', alignSelf: 'center',
                                    }}>
                                        {currency}
                                        <Icon name="chevron-down" size={10} color="rgba(255,255,255,0.78)" />
                                    </span>
                                    <span style={{
                                        fontSize: 26, fontWeight: 700, color: '#fff',
                                        fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.02em',
                                        textShadow: '0 1px 3px rgba(0,0,0,0.35)', whiteSpace: 'nowrap',
                                        lineHeight: 1.05,
                                    }}>{amount.toFixed(2)}</span>
                                    {/* blinking caret */}
                                    <span style={{
                                        display: 'inline-block', width: 2, height: 22,
                                        background: 'rgba(255,255,255,0.85)', borderRadius: 1,
                                        marginLeft: 1, alignSelf: 'center',
                                        animation: 'kupapay-caret 1s steps(2) infinite',
                                    }} />
                                </button>

                                {/* Arrow line */}
                                <div style={{ display: 'flex', alignItems: 'center', gap: 2, width: '100%' }}>
                                    <div style={{ flex: 1, height: 2, background: 'rgba(255,255,255,0.85)', borderRadius: 9999 }} />
                                    <Icon name="chevron-forward" size={18} color="rgba(255,255,255,0.95)" />
                                </div>

                                {/* Swap direction */}
                                <button style={{
                                    padding: '2px 8px', borderRadius: 9999,
                                    background: 'rgba(255,255,255,0.18)', color: '#fff',
                                    border: '1px solid rgba(255,255,255,0.35)',
                                    fontSize: 10, fontWeight: 700, letterSpacing: '0.04em',
                                    cursor: 'pointer', fontFamily: 'var(--font-sans)',
                                    display: 'inline-flex', alignItems: 'center', gap: 4,
                                }}>
                                    <Icon name="swap-horizontal-outline" size={11} color="#fff" />
                                    SWAP
                                </button>
                            </div>
                            <FlowAvatar member={DAVID} label="TO" />
                        </div>
                    </div>
                </div>

                {/* Method — square icon tiles */}
                <div style={{ padding: '20px 16px 0 16px' }}>
                    <div className="text-eyebrow" style={{ fontSize: 9, marginBottom: 8 }}>Method</div>
                    <div style={{ display: 'flex', gap: 10 }}>
                        {METHODS.map(m => {
                            const on = m.id === 'bankTransfer';
                            return (
                                <button key={m.id} aria-label={m.label} style={{
                                    width: 56, height: 56, borderRadius: 14,
                                    background: on ? 'var(--primary-extra-light)' : '#fff',
                                    border: `1px solid ${on ? 'var(--primary-light)' : 'var(--border-card)'}`,
                                    boxShadow: on ? 'none' : 'var(--shadow-sm)',
                                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                    cursor: 'pointer', flexShrink: 0,
                                    fontFamily: 'var(--font-sans)',
                                    WebkitTapHighlightColor: 'transparent',
                                }}>
                                    <Icon name={m.icon} size={22} color={on ? 'var(--primary-dark)' : 'var(--gray-700)'} />
                                </button>
                            );
                        })}
                    </div>
                </div>
            </div>

            {/* Bottom dock — small date chip + big primary button */}
            <div style={{
                position: 'absolute', left: 0, right: 0, bottom: 0,
                padding: '10px 16px 22px 16px',
                background: 'rgba(255,255,255,0.92)',
                backdropFilter: 'saturate(180%) blur(12px)',
                WebkitBackdropFilter: 'saturate(180%) blur(12px)',
                borderTop: '1px solid var(--border-soft)',
            }}>
                <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 8 }}>
                    <button style={{
                        display: 'inline-flex', alignItems: 'center', gap: 6,
                        padding: '5px 12px', borderRadius: 9999,
                        background: '#fff', border: '1px solid var(--border-card)',
                        boxShadow: 'var(--shadow-sm)',
                        cursor: 'pointer', fontFamily: 'var(--font-sans)',
                        WebkitTapHighlightColor: 'transparent',
                    }}>
                        <Icon name="calendar-outline" size={13} color="var(--gray-600)" />
                        <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>Today, Aug 14</span>
                        <Icon name="chevron-down" size={11} color="var(--gray-500)" />
                    </button>
                </div>
                <button style={{
                    width: '100%', padding: '14px 20px',
                    borderRadius: 'var(--radius-xl)',
                    background: 'var(--primary)', color: '#fff',
                    border: 0, fontSize: 16, fontWeight: 700,
                    fontFamily: 'var(--font-sans)', cursor: 'pointer',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                    boxShadow: 'var(--shadow-fab)',
                    WebkitTapHighlightColor: 'transparent',
                }}>
                    <Icon name="checkmark-circle" size={20} color="#fff" />
                    Record payment · {currency} {amount.toFixed(2)}
                </button>
            </div>
        </div>
    );
}

// ─────────────────────────────────────────────────────────────────────────
// FadedBackdrop — context behind the sheet (mock of the group screen).
// In production this is the actual GroupDetailScreen rendered as-is —
// the sheet just slides up over it.
// ─────────────────────────────────────────────────────────────────────────
function FadedBackdrop() {
    return (
        <div style={{ height: '100%', background: 'var(--bg-secondary)' }}>
            <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '8px 8px 6px 8px', background: '#fff',
            }}>
                <IconButton name="chevron-back" size={24} color="var(--gray-700)" />
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-secondary)' }}>Group</div>
                <div style={{ display: 'flex' }}>
                    <IconButton name="share-outline" size={22} color="var(--gray-700)" />
                    <IconButton name="ellipsis-vertical" size={22} color="var(--gray-700)" />
                </div>
            </div>
            <div style={{ padding: '6px 16px 12px 16px', background: '#fff' }}>
                <div style={{ borderRadius: 20, overflow: 'hidden', border: '1px solid var(--border-card)', boxShadow: 'var(--shadow-sm)', background: '#fff' }}>
                    <div style={{ height: 150, position: 'relative' }}>
                        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800&fit=crop"
                             alt=""
                             style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 100%)' }} />
                        <div style={{ position: 'absolute', left: 14, right: 14, bottom: 10, color: '#fff' }}>
                            <div style={{ fontSize: 18, fontWeight: 700, textShadow: '0 1px 4px rgba(0,0,0,0.5)' }}>Weekend in Tel Aviv</div>
                            <div style={{ fontSize: 11, opacity: 0.9, marginTop: 2 }}>4 people</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

// ─────────────────────────────────────────────────────────────────────────
// Root — phone frame · faded backdrop · scrim · sheet
// ─────────────────────────────────────────────────────────────────────────
const SAFE_TOP    = 62;
const SHEET_HEIGHT_PCT = 62; // 62% of the area below the status bar

function App() {
    return (
        <IOSDevice width={402} height={874}>
            <div style={{ position: 'relative', height: '100%' }}>
                <div style={{ height: SAFE_TOP, background: 'var(--bg-secondary)' }} />
                <div style={{ position: 'absolute', left: 0, right: 0, top: SAFE_TOP, bottom: 0 }}>
                    {/* Faded group backdrop */}
                    <FadedBackdrop />
                    {/* Scrim — tap to dismiss in production */}
                    <div style={{ position: 'absolute', inset: 0, background: 'rgba(15,23,42,0.55)' }} />
                    {/* Sheet */}
                    <div style={{
                        position: 'absolute', left: 0, right: 0, bottom: 0,
                        height: `${SHEET_HEIGHT_PCT}%`,
                        background: '#fff',
                        borderRadius: '24px 24px 0 0',
                        boxShadow: '0 -8px 24px rgba(0,0,0,0.18)',
                        overflow: 'hidden',
                        display: 'flex', flexDirection: 'column',
                    }}>
                        <SettleUpSheet />
                    </div>
                </div>
            </div>
        </IOSDevice>
    );
}

ReactDOM.createRoot(document.getElementById('stage')).render(<App />);
</script>
</body>
</html>
