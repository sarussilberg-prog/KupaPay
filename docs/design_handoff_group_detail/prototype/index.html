<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kupa · Mobile UI Kit</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-letterbox); font-family: var(--font-sans); }
    body {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px 0;
        box-sizing: border-box;
    }
    #stage { display: flex; align-items: center; justify-content: center; }
    @keyframes kupa-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens/LoginScreen.jsx"></script>
<script type="text/babel" src="screens/GroupsListScreen.jsx"></script>
<script type="text/babel" src="screens/GroupDetailScreen.jsx"></script>
<script type="text/babel" src="screens/ProfileScreen.jsx"></script>
<script type="text/babel" src="screens/ActivityScreen.jsx"></script>
<script type="text/babel" src="screens/AddExpenseScreen.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<script type="text/babel" data-presets="react">
function Stage() {
    // Compute scale so the 402×874 iPhone fits in any viewport.
    const [scale, setScale] = React.useState(1);
    React.useEffect(() => {
        const compute = () => {
            const m = 24;
            const s = Math.min(1, (window.innerWidth - m * 2) / 402, (window.innerHeight - m * 2) / 874);
            setScale(s);
        };
        compute();
        window.addEventListener('resize', compute);
        return () => window.removeEventListener('resize', compute);
    }, []);
    return (
        <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
            <IOSDevice width={402} height={874}>
                <window.App />
            </IOSDevice>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('stage')).render(<Stage />);
</script>
</body>
</html>
