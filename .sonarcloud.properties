# SonarCloud Automatic Analysis ("Auto-Scan") configuration.
#
# Auto-Scan IGNORES sonar-project.properties (see SonarCloud docs) and reads
# this file instead. The same exclusions are mirrored in sonar-project.properties
# for anyone running the CLI scanner locally; this file is what CI actually honors.
#
# Migration SQL files are append-only history: each new migration that creates or
# replaces a function necessarily duplicates the function body from schema.sql and
# from earlier migrations for the same object. That duplication is deliberate — it
# encodes "the state at this point in time" — and gating CI on it produces
# false-positive Quality Gate failures (duplication on new code) for every DB
# refactor. Exclude the directory from copy-paste detection and analysis.
sonar.cpd.exclusions=cost-share-app/supabase/migrations/**/*.sql
sonar.exclusions=cost-share-app/supabase/migrations/**/*.sql,cost-share-app/packages/shared/dist/**
