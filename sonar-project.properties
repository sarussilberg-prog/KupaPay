# SonarCloud project configuration.

sonar.projectKey=sarussilberg-prog_CoPay
sonar.organization=sarussilberg-prog

# Migration SQL files are append-only history: each new migration that creates
# or replaces a function necessarily duplicates the function body found in
# schema.sql (and frequently in earlier migrations for the same object). That
# duplication is deliberate — it's how the migration log encodes "the state at
# this point in time" — and gating CI on it produces false-positive quality
# gate failures for every database refactor. Exclude the directory from
# copy-paste detection.
sonar.cpd.exclusions=cost-share-app/supabase/migrations/**/*.sql

# Migrations are also reviewed against schema.sql; their own contents are
# typically a near-1:1 echo of the canonical schema, so per-file metrics
# (cognitive complexity, duplication blocks) are not actionable.
sonar.exclusions=cost-share-app/supabase/migrations/**/*.sql,cost-share-app/packages/shared/dist/**
