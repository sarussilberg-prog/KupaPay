name: CI

on:
  pull_request:
    branches: [dev]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cost-share-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cost-share-app/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Mobile tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cost-share-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cost-share-app/package-lock.json
      - run: npm ci
      - run: npm test --workspace=@cost-share/mobile -- --passWithNoTests --ci

  auto-merge:
    name: Auto-merge to dev
    needs: [lint, test]
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    # Serialize merge + bump across PRs so two concurrent merges can't race on
    # version.json (each PR merge produces exactly one patch bump).
    concurrency:
      group: dev-merge-and-bump
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --squash --repo "$REPO"

      - name: Check out dev (post-merge)
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Patch-bump the App Version SSOT on every merge to dev.
      # NO RECURSION: this is a push to dev, and CI runs only on `pull_request`, so a
      # push can never re-trigger this workflow. (GITHUB_TOKEN pushes also don't
      # trigger workflows, and the old push-triggered bump-version-dev.yml is gone.)
      - name: Bump patch version on dev
        run: |
          set -euo pipefail
          VERSION_FILE="cost-share-app/packages/shared/version.json"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin dev
            git reset --hard origin/dev
            current=$(jq -r '.version' "$VERSION_FILE")
            IFS='.' read -r major minor patch <<< "$current"
            new="${major}.${minor}.$((patch + 1))"
            jq -c --arg v "$new" '.version = $v' "$VERSION_FILE" > tmp.json && mv tmp.json "$VERSION_FILE"
            git add "$VERSION_FILE"
            git commit -m "chore: bump version ${current} → ${new}"
            if git push origin HEAD:dev; then
              echo "✅ Bumped ${current} → ${new}"
              exit 0
            fi
            echo "dev moved during bump; retrying (${attempt}/3)"
          done
          echo "::error::failed to bump version after 3 attempts"
          exit 1
