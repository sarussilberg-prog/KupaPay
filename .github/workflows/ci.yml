name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cost-share-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cost-share-app/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Mobile tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cost-share-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cost-share-app/package-lock.json
      - run: npm ci
      - run: npm test --workspace=@cost-share/mobile -- --passWithNoTests --ci

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for blame and new-code detection

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cost-share-app/package-lock.json

      - name: Install dependencies
        working-directory: cost-share-app
        run: npm ci

      - name: Run tests with coverage
        working-directory: cost-share-app
        run: npm test --workspace=@cost-share/mobile -- --coverage --passWithNoTests --ci

      - name: Analyse with SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  auto-merge:
    name: Auto-merge to dev
    needs: [lint, test, sonar]
    # Only run for PRs targeting dev — PRs to main are reviewed and merged manually.
    if: github.event.pull_request.draft == false && github.base_ref == 'dev'
    runs-on: ubuntu-latest
    # Serialize merge + bump across PRs so two concurrent merges can't race on
    # version.json (each PR merge produces exactly one patch bump).
    concurrency:
      group: dev-merge-and-bump
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --squash --repo "$REPO"

      - name: Check out dev (post-merge)
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Patch-bump the App Version SSOT on every merge to dev (except version-bump PRs
      # themselves, to prevent recursion). Opens a PR that auto-merges once CI passes,
      # so that the version bump goes through branch protection like any other change.
      - name: Bump patch version on dev
        if: "!startsWith(github.head_ref, 'chore/version-bump/')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION_FILE="cost-share-app/packages/shared/version.json"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          current=$(jq -r '.version' "$VERSION_FILE")
          IFS='.' read -r major minor patch <<< "$current"
          new="${major}.${minor}.$((patch + 1))"
          BUMP_BRANCH="chore/version-bump/${new}"

          git checkout -b "${BUMP_BRANCH}"
          jq -c --arg v "$new" '.version = $v' "$VERSION_FILE" > tmp.json && mv tmp.json "$VERSION_FILE"
          git add "$VERSION_FILE"
          git commit -m "chore: bump version ${current} → ${new}"
          git push origin "${BUMP_BRANCH}"

          PR_URL=$(gh pr create \
            --base dev \
            --head "${BUMP_BRANCH}" \
            --title "chore: bump version ${current} → ${new}" \
            --body "Automated patch version bump.")
          gh pr merge "${PR_URL}" --squash --auto
          echo "✅ Bump PR ${PR_URL} queued for auto-merge."
