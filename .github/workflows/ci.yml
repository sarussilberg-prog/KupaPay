name: CI

on:
  pull_request:
    branches: [dev]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cost-share-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cost-share-app/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Mobile tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cost-share-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cost-share-app/package-lock.json
      - run: npm ci
      - run: npm test --workspace=@cost-share/mobile -- --passWithNoTests --ci

  auto-merge:
    name: Auto-merge to dev
    needs: [lint, test]
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --squash --repo "$REPO"
