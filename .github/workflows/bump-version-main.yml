name: Bump minor version (main)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'cost-share-app/packages/shared/version.json'

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump:
    name: Minor-bump version on main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.ADMIN_PAT }}

      # Direct commit on main — no PR. main requires status checks (Lint,
      # Mobile tests) before any push, including direct ones; a fresh bump
      # commit has no checks recorded against it, so GITHUB_TOKEN gets
      # rejected with GH006. Pushing with an admin PAT works because
      # enforce_admins is false, so admins bypass required status checks.
      # A GITHUB_TOKEN push (were it usable) would not re-trigger workflows,
      # and paths-ignore skips version-only pushes, so there is no recursion.
      # The baseline is read from the CURRENT version.json (robust: the old
      # HEAD~1 lookup broke on the first release after the SSOT landed, since
      # the previous main commit had no packages/shared/version.json).
      - name: Minor-bump packages/shared/version.json
        run: |
          set -euo pipefail
          VERSION_FILE="cost-share-app/packages/shared/version.json"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            current=$(jq -r '.version' "$VERSION_FILE")
            IFS='.' read -r major minor patch <<< "$current"
            new="${major}.$((minor + 1)).0"
            jq -c --arg v "$new" '.version = $v' "$VERSION_FILE" > tmp.json && mv tmp.json "$VERSION_FILE"
            git add "$VERSION_FILE"
            git commit -m "chore: bump version ${current} → ${new}"
            if git push origin HEAD:main; then
              echo "✅ Bumped ${current} → ${new}"
              exit 0
            fi
            echo "main moved during bump; retrying (${attempt}/3)"
          done
          echo "::error::failed to bump version after 3 attempts"
          exit 1
